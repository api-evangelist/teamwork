created: '2026-05-11'
modified: '2026-05-11'
specificationVersion: '0.19'
apis:
  - aid: teamwork:projects-api-v3
    name: Teamwork.com Projects API v3
    description: >-
      REST API for the Teamwork.com Projects product providing programmatic
      access to projects, tasks, milestones, time entries, people, companies,
      tags, and reporting. Authentication supports OAuth 2.0 Bearer Tokens
      and HTTP Basic Auth using an API key. Base URL is region- and
      site-specific (https://{site}.teamwork.com/projects/api/v3 for US
      hosting, https://{site}.eu.teamwork.com/projects/api/v3 for EU).
    humanURL: https://apidocs.teamwork.com/docs/teamwork/v3
    baseURL: https://{site}.teamwork.com/projects/api/v3
    tags:
      - Project Management
      - Tasks
      - Time Tracking
      - Milestones
      - Reporting
    properties:
