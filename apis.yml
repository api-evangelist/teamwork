aid: teamwork
name: Teamwork.com
description: >-
  Teamwork.com is a project management and client work platform built for
  client services, agencies, and professional services teams to manage
  projects, tasks, time tracking, billing, resource planning, and
  collaboration in one place. The platform provides product offerings
  including Projects, Desk, Chat, Spaces, and CRM with deep integrations
  across the client delivery lifecycle. Teamwork.com offers a comprehensive
  REST API (v3) for the Projects product allowing programmatic access to
  projects, tasks, time entries, milestones, people, and reporting, with
  Bearer Token (OAuth 2.0) and HTTP Basic authentication.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Project Management
  - Client Services
  - Task Management
  - Time Tracking
  - Collaboration
  - Professional Services Automation
url: >-
